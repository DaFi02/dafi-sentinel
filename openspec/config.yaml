schema: spec-driven

project: dafi-sentinel
initialized_at: 2026-07-14
artifact_store: both

context: |
  DAFI Sentinel is a Python package managed by uv with Python 3.13 as the project target.
  PR1 is foundation-only: package skeleton, domain contracts, repository/retrieval ports, and pytest-based contract tests.
  Later slices may add infrastructure, APIs, UI, ML, and orchestration; PR1 must not introduce those implementations.

strict_tdd: true
strict_tdd_evidence:
  - No explicit strict TDD marker was found at the root before initialization.
  - DAFI Sentinel uses a project-local pytest runner for PR1 foundation work.
  - First implementation tasks added the runner before production contracts.

testing:
  detected: 2026-07-14
  strict_tdd: true
  runtime_observed: "uv run pytest uses Python 3.13.13 via .venv after the PR3 shebang repair"
  primary_commands:
    - scope: dafi_sentinel
      command: "uv run pytest"
      status: detected
      notes: "Default run; pgvector smoke is skipped without DAFI_PGVECTOR_SMOKE."
    - scope: dafi_sentinel
      command: "DAFI_PGVECTOR_SMOKE=1 DAFI_PGVECTOR_DSN=postgresql://sentinel:sentinel@127.0.0.1:55432/sentinel uv run pytest"
      status: detected
      notes: "PR3 pgvector smoke against the Podman Compose stack at infra/podman/compose.yaml."
    - scope: dafi_sentinel
      command: "podman compose -f infra/podman/compose.yaml up -d"
      status: detected
      notes: "Spins up the local PostgreSQL + pgvector service used by the PR3 smoke."
  layers:
    unit:
      available: true
      tools: [pytest]
    integration:
      available: true
      tools: [pytest, podman-compose, pgvector]
      notes: "PR3 integration layer is the pgvector smoke test gated on DAFI_PGVECTOR_SMOKE=1."
    e2e:
      available: false
      tools: []
  coverage:
    available: false
    commands: []
  quality:
    linter:
      available: false
      commands: []
    type_checker:
      available: false
      commands: []
    formatter:
      available: false
      commands: []

rules:
  proposal:
    - State the business intent, measurable outcome, and rollback plan for risky changes.
    - Forecast whether the change exceeds the 400 changed-line review budget and plan chained PRs when needed.
  specs:
    - Use RFC 2119 keywords for requirements.
    - Use Given/When/Then scenarios for externally visible behavior.
    - Keep generated technical artifacts in English unless explicitly requested otherwise.
  design:
    - Document architecture decisions with rationale and trade-offs.
    - Include sequence diagrams for complex flows.
    - Preserve PR boundaries; infrastructure and runtime implementations belong to later slices.
  tasks:
    - Group tasks by phase and keep each task completable in one focused session.
    - Pair implementation tasks with tests under strict TDD.
  apply:
    tdd: true
    test_command: "uv run pytest"
    instructions:
      - Write or update the failing test before production code when a project-local runner exists.
      - If the runner does not exist yet, the first apply task must create it and prove it runs.
  verify:
    test_command: "uv run pytest"
    build_command: null
    coverage_threshold: 0
    instructions:
      - Report commands run, skipped commands, and reasons.
  archive:
    - Merge completed delta specs into openspec/specs/ and keep archived changes immutable.
