[project]
name = "dafi-sentinel"
version = "0.1.0"
description = "Foundation contracts for DAFI Sentinel."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pgvector>=0.3",
    "psycopg[binary]>=3.2",
]

[dependency-groups]
dev = [
    "pytest>=9.1.1",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests/dafi_sentinel"]
